<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>asesthetic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fdfaf7;
  color: #2f2f2f;
}

nav {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(253,250,247,0.8);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  font-size: 14px;
}

nav a {
  text-decoration: none;
  color: #555;
  letter-spacing: 1px;
}

header {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 70px;
  margin: 0;
}

.subtitle {
  margin-top: 10px;
  letter-spacing: 3px;
  font-size: 12px;
  color: #777;
}

section {
  padding: 100px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

footer {
  padding: 40px;
  font-size: 12px;
  color: #999;
}
</style>
</head>

<body>

<nav>
  <a href="#">HOME</a>
  <a href="#about">ABOUT</a>
  <a href="#gallery">GALLERY</a>
</nav>

<header>
  <h1>asesthetic</h1>
  <div class="subtitle">lifestyle • fitness • soft living</div>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>Welcome to my world — where fitness meets soft, feminine energy and aesthetic living.</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://source.unsplash.com/300x400/?aesthetic">
    <img src="https://source.unsplash.com/300x400/?gym">
    <img src="https://source.unsplash.com/300x400/?lifestyle">
  </div>
</section>

<footer>
  © 2026 asesthetic
</footer>

</body>
</html>
