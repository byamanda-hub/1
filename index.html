<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>asesthetic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #fdfaf7;
  color: #2f2f2f;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  background: rgba(253,250,247,0.7);
  backdrop-filter: blur(12px);
  z-index: 100;
}

nav a {
  text-decoration: none;
  color: #555;
  font-size: 13px;
  letter-spacing: 2px;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  letter-spacing: 2px;
}

.subtitle {
  margin-top: 15px;
  font-size: 12px;
  letter-spacing: 3px;
  color: #888;
}

/* SECTION */
section {
  padding: 120px 20px;
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 20px;
}

p {
  color: #666;
  max-width: 600px;
  margin: auto;
}

/* GALLERY */
.gallery {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* FOOTER */
footer {
  padding: 50px;
  font-size: 12px;
  text-align: center;
  color: #aaa;
}
</style>
</head>

<body>

<nav>
  <a href="#">HOME</a>
  <a href="#about">ABOUT</a>
  <a href="#gallery">GALLERY</a>
</nav>

<header>
  <h1>asesthetic</h1>
  <div class="subtitle">lifestyle • fitness • soft living</div>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>
    A curated space where fitness, femininity, and aesthetic living meet.  
    This is more than a brand — it’s a lifestyle.
  </p>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <img src="https://images.unsplash.com/photo-1518611012118-fdd7f1aef1c4">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1520975922326-3f4c6c5e9c7c">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
  </div>
</section>

<footer>
  © 2026 asesthetic
</footer>

</body>
</html>
